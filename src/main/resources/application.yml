spring:
  application:
    name: ${SPRING_APPLICATION_NAME:odos-server-v2}
  config:
    import:
      - classpath:application-security.yml

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:5432}/${POSTGRES_DB:postgres}?sslmode=require&prepareThreshold=0
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_schema: ${POSTGRES_SCHEMA:odos_dev}

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: ${POSTGRES_SCHEMA:odos_dev}
    schemas: ${POSTGRES_SCHEMA:odos_dev}
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: baseline-existing-schema

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 60MB

logging:
  level:
    root: INFO
    com.odos.odos_server_v2: DEBUG
    com.odos.odos_server_v2.domain.diary.service.DiaryService: DEBUG

server:
  forward-headers-strategy: framework

cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}

decorator:
  datasource:
    p6spy:
      enable-logging: true
      multiline: false
      logging: slf4j
      include-parameter-values: false
      log-format: "%(executionTime) ms | %(sqlSingleLine)"

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
