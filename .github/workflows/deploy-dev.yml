name: Deploy DEV (ECR -> EC2)

on:
  push:
    branches: [ "dev" ]

permissions:
  contents: read
  id-token: write

jobs:
  deploy_dev:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_REPO: "1d1s-dev-ecr"
      COMPOSE_FILE: "docker-compose.dev.yml"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}

      # nginx/nginx.conf 전송
      - name: Copy nginx.conf via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "nginx/nginx.conf"
          target: "/home/ubuntu/1d1s-dev/1D1S-server-v2"
          strip_components: 1

      - name: Copy docker-compose via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.dev.yml"
          target: "/home/ubuntu/1d1s-dev/1D1S-server-v2"

      - name: Deploy DEV on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/1d1s-dev/1D1S-server-v2
            
            # 1. ECR 로그인
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            
            # 2. 이미지 Pull & 컨테이너 재시작
            export ECR_REGISTRY=${{ env.ECR_REGISTRY }}
            docker compose -p 1d1s-dev -f docker-compose.dev.yml pull app
            docker compose -p 1d1s-dev -f docker-compose.dev.yml up -d --force-recreate --no-deps app

            # 3. Spring 애플리케이션 실제 기동 확인. 실패하면 Actions 로그에
            # 컨테이너 상태와 최근 로그를 남겨 배포 성공으로 오판하지 않는다.
            healthy=false
            for attempt in $(seq 1 30); do
              if curl -fsS --max-time 3 http://127.0.0.1:18081/swagger-ui/index.html >/dev/null; then
                healthy=true
                break
              fi
              sleep 2
            done
            if [ "$healthy" != "true" ]; then
              docker ps -a --filter name=oneday-onestreak-dev
              docker logs --tail 200 oneday-onestreak-dev
              exit 1
            fi
            
            # 4. Nginx 설정 교체 (api-dev.conf로 고정)
            sudo mv ./nginx.conf /etc/nginx/conf.d/api-dev.conf
            sudo nginx -t && sudo systemctl reload nginx

            docker image prune -f

      - name: Notify Discord
        if: always()
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: '1351796500279197757'
          STATUS: ${{ job.status }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ "$STATUS" = "success" ] && icon="✅ DEV 배포 완료" || icon="❌ DEV 배포 실패"
          body=$(jq -n --arg c "$icon
          \`${{ github.sha }}\` by ${{ github.actor }}
          $(printf '%s' "$COMMIT_MSG" | head -1)
          $RUN_URL" '{content: $c}')
          curl -sS -X POST "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$body"
